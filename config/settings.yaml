audio:
  sample_rate: 16000        # Hz — required by both Whisper and Silero VAD
  channels: 1               # Mono only
  chunk_size: 512           # Samples per VAD frame (Silero requirement: 512 @ 16kHz)
  device_index: 1           # Echo Cancelling Speakerphone (system default)

vad:
  threshold: 0.3            # Silero confidence threshold (0.0–1.0). Higher = less sensitive.
  min_speech_duration_ms: 100
  min_silence_duration_ms: 700
  speech_pad_ms: 30

transcription:
  model_size: medium        # tiny, base, small, medium, large-v2, large-v3
  device: auto              # auto, cuda, cpu
  compute_type: auto        # auto → float16 (cuda) or int8 (cpu)
  beam_size: 5
  language: en              # null to auto-detect
  vad_filter: false         # We handle VAD upstream; disable Whisper's internal VAD

buffer:
  max_words: 200
  max_silence_ms: 3000
  sentence_end_chars: []

structuring:
  enabled: false
  ollama_url: http://localhost:11434
  model: mistral            # must be pulled first: ollama pull mistral
  timeout_seconds: 10
  context_window: 3         # number of recent cleaned sentences to pass as context
  prompt_template: |
    Clean the raw speech transcription below. Make only these changes:
    - Fix capitalization (capitalize the first word of each sentence)
    - Fix end-of-sentence punctuation (. ! ?)
    - Ensure a space follows each period, exclamation mark, or question mark
    - Remove only: "um", "uh"
    - Do not rephrase, restructure, reorder, or add any words
    - Return ONLY the cleaned text with no commentary and no quotation marks
    {context_section}
    Raw transcription:
    {text}

output:
  method: sendinput         # sendinput (recommended), clipboard, or direct_keyboard
  paste_delay_ms: 100       # only used when method: clipboard
  streaming_preview: false  # debug only: set true to show raw preview text (### markers) then replace with cleaned version
  typing_indicator: true    # show animated dots (·) at cursor while waiting for transcription

hotkey:
  toggle: ctrl+`
  cancel: escape

overlay:
  enabled: true
  position: top-third         # top-center | top-third | top-left | top-right | bottom-right | bottom-left
  offset_px: [0, 0]           # x/y offset from anchor position in pixels
  fade_duration_ms: 1500      # fade-out duration when returning to idle
  opacity: 0.70               # overlay opacity while visible (0.0–1.0)

app:
  run_at_login: false         # informational only; registry is authoritative
